const AuthModal = ({ onClose, onAuth }) => {
  const [email,setEmail] = useState("");
  const [name,setName] = useState("");

  const submit = () => {
    if (!email.trim()) return;
    const key = `phub_user_${email.toLowerCase().trim()}`;
    let user = sg(key);
    if (mode === "signup") {
      if (user) { alert("Account exists. Try sign in."); return; }
      user = { email:email.toLowerCase().trim(), name:name.trim()||email.split("@")[0], plan:"free", balance:0, verified:false, joinedAt:Date.now(), purchases:[], listings:[], notifications:[{id:`n_${Date.now()}`,type:"system",title:"Welcome to Patronos Hub!",message:"Start by exploring trending projects or list your first product.",ts:Date.now(),read:false}] };
      ss(key, user);
    } else {
      if (!user) { alert("No account. Try signing up."); return; }
    }
    ss("phub_session", { email:user.email });
    onAuth(user);
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm" style={{backgroundColor:"rgba(13,13,13,0.6)"}}>
      <div className="relative w-full max-w-md float-up">

          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@domain.com" type="email" className="w-full px-4 py-3 mb-5 rounded-lg text-sm font-mono bg-white" style={{border:`1px solid ${C.border}`}}/>
          <Btn className="w-full mb-3" onClick={submit} size="lg">{mode==="signup"?"Create account":"Sign in"} <I name="arrowRight" size={16}/></Btn>

        </div>
      </div>
    </div>
  );
};

/* ===== MARKETPLACE ===== */
const Marketplace = ({ listings, onSelect, currentUser, allReviews }) => {
  const [q,setQ] = useState("");
  const [cat,setCat] = useState("all");
  const [sort,setSort] = useState("trending");

  const enriched = useMemo(()=> listings.map(l => {
    const rs = allReviews.filter(r => r.listingId === l.id);
    if (rs.length === 0) return l;
    const avg = rs.reduce((a,r) => a+r.rating, 0) / rs.length;
    return { ...l, rating: Number(avg.toFixed(1)), reviewCount: rs.length };
  }), [listings, allReviews]);

  const filtered = useMemo(()=>{
    let r = [...enriched];
    if (cat !== "all") r = r.filter(l => l.category === cat);
    if (q.trim()) {
      const s = q.toLowerCase();
      r = r.filter(l => l.title.toLowerCase().includes(s) || l.desc.toLowerCase().includes(s) || l.seller.toLowerCase().includes(s));
    }
    if (sort==="trending") r.sort((a,b) => (b.trending?1:0)-(a.trending?1:0) || (b.featured?1:0)-(a.featured?1:0) || b.sales-a.sales);
    else if (sort==="newest") r.sort((a,b) => (b.createdAt||0)-(a.createdAt||0));
    else if (sort==="earned") r.sort((a,b) => (b.sales*b.price)-(a.sales*a.price));
    else if (sort==="rating") r.sort((a,b) => b.rating-a.rating);
    return r;
  }, [enriched, q, cat, sort]);

  const hero = enriched.find(l => l.featured && l.trending) || enriched[0];
  const picks = enriched.filter(l => l.featured).slice(0,3);
  const trending = enriched.filter(l => l.trending).slice(0,4);

  return (
    <div>
      <div className="mb-10">
        <div className="font-mono text-xs tracking-widest uppercase mb-3" style={{color:C.emerald}}>// Discover</div>
        <h1 className="font-serif font-medium leading-tight mb-2" style={{fontSize:"clamp(36px, 5vw, 56px)",letterSpacing:"-0.02em"}}>
          Hey {currentUser.name?.split(" ")[0]},<br/><em className="italic">what's new today?</em>
        </h1>
        <p className="text-base mt-3" style={{color:C.muted}}>{listings.length} live projects · {listings.reduce((a,l)=>a+l.sales,0).toLocaleString()} buyers · ${listings.reduce((a,l)=>a+l.sales*l.price,0).toLocaleString()} volume</p>
      </div>

      {hero && cat==="all" && !q && (
        <div className="mb-14 rounded-3xl overflow-hidden grid lg:grid-cols-2 card-hover" style={{backgroundColor:"#fff",border:`1px solid ${C.border}`}}>
          <button onClick={()=>onSelect(hero)} className="text-left"><ProjectCover category={hero.category} height={420}/></button>
          <button onClick={()=>onSelect(hero)} className="p-8 sm:p-12 text-left flex flex-col justify-between">
            <div>
              <div className="flex items-center gap-2 mb-4">
                <Pill color="ink"><I name="flame" size={11}/> Project of the week</Pill>
                {hero.verified && <Pill color="emerald"><I name="badgeCheck" size={11}/> Verified</Pill>}
              </div>
              <h2 className="font-serif font-medium text-4xl sm:text-5xl mb-4 leading-tight" style={{letterSpacing:"-0.02em"}}>{hero.title}</h2>
              <p className="text-base leading-relaxed mb-6" style={{color:C.muted}}>{hero.desc}</p>
              <div className="flex items-center gap-2.5 mb-6">
                <Avatar name={hero.seller} size={32}/><span className="text-sm font-medium">@{hero.seller}</span>
              </div>
            </div>
            <div className="grid grid-cols-3 gap-4 pt-6" style={{borderTop:`1px solid ${C.border}`}}>
              <div><div className="font-serif text-2xl font-semibold" style={{color:C.emerald}}>${(hero.sales*hero.price*0.85).toLocaleString(undefined,{maximumFractionDigits:0})}</div><div className="text-[10px] uppercase tracking-wider mt-0.5" style={{color:C.muted}}>Earned</div></div>

            </div>

/* ===== CHECKOUT WITH COUPON ===== */
const CheckoutModal = ({ listing, onClose, onConfirm }) => {
  const [coupon,setCoupon] = useState("");
  const [applied,setApplied] = useState(null);
  const [error,setError] = useState("");
  const discount = applied ? listing.price * applied.discount : 0;
  const total = listing.price - discount;
  const apply = () => {
    const c = COUPONS[coupon.toUpperCase().trim()];
    if (!c) { setError("Invalid code"); setApplied(null); return; }
    if (!c.active) { setError("Code expired"); setApplied(null); return; }
    setApplied({ code:coupon.toUpperCase().trim(), ...c });
    setError("");
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm" style={{backgroundColor:"rgba(13,13,13,0.6)"}}>
      <div className="relative w-full max-w-md float-up">
        <div className="rounded-2xl p-8" style={{backgroundColor:C.paper,border:`1px solid ${C.border}`}}>
          <div className="flex items-center justify-between mb-6">
            <div className="font-mono text-xs uppercase tracking-widest" style={{color:C.emerald}}>// Checkout</div>
            <button onClick={onClose} style={{color:C.muted}}><I name="x" size={18}/></button>

const App = () => {
  const [user,setUser] = useState(null);
  const [authOpen,setAuthOpen] = useState(false);
  const [view,setView] = useState("marketplace");
  const [listings,setListings] = useState([]);
  const [reviews,setReviews] = useState([]);
  const [selected,setSelected] = useState(null);
  const [showUpgrade,setShowUpgrade] = useState(false);
  const [loading,setLoading] = useState(true);
  const [browseOnly,setBrowseOnly] = useState(false);
  const [toast,setToast] = useState(null);

  useEffect(() => {
    let allListings = sg("phub_listings");
    if (!allListings || allListings.length===0) {
      allListings = SEED_LISTINGS.map((l,i) => ({ ...l, id:`seed_${i}`, sellerEmail:`${l.seller}@patronos.hub`, createdAt:Date.now()-i*86400000 }));
      ss("phub_listings", allListings);
    }
    setListings(allListings);

    let allReviews = sg("phub_reviews");
    if (!allReviews || allReviews.length===0) {
      allReviews = SEED_REVIEWS.map((r,i) => ({ ...r, id:`r_${i}`, ts: Date.now() - r.daysAgo*86400000 }));
      ss("phub_reviews", allReviews);
    }
    setReviews(allReviews);

    const sess = sg("phub_session");
    if (sess?.email) {
      const u = sg(`phub_user_${sess.email}`);
      if (u) setUser(u);
    }
    setLoading(false);
  }, []);

  const showToast = (msg) => setToast({ msg, id: Date.now() });

  const handleAuth = (u) => { setUser(u); setAuthOpen(false); setBrowseOnly(false); setView("marketplace"); };
  const handleLogout = () => { sd("phub_session"); setUser(null); setBrowseOnly(false); };

  const persistUser = (u) => { setUser(u); ss(`phub_user_${u.email}`, u); };

  const handleCreate = async (data) => {
    const newL = { ...data, id:`l_${Date.now()}`, rating:5.0, sales:0, featured:false, verified:user.verified, trending:false, createdAt:Date.now() };
    const updated = [newL, ...listings];
    setListings(updated); ss("phub_listings", updated);
    persistUser({ ...user, listings:[...(user.listings||[]), newL.id] });
    showToast(`"${newL.title}" is now live!`);
  };

  const handlePurchase = async (listing, coupon) => {
    const finalPrice = coupon ? listing.price*(1-coupon.discount) : listing.price;
    const purchase = { listingId:listing.id, purchasedAt:Date.now(), price:finalPrice, coupon:coupon?.code };
    persistUser({ ...user, purchases:[...(user.purchases||[]), purchase] });
    const updL = listings.map(l => l.id===listing.id ? { ...l, sales:l.sales+1 } : l);
    setListings(updL); ss("phub_listings", updL);
    const seller = sg(`phub_user_${listing.sellerEmail}`);
    if (seller) {
      seller.balance = (seller.balance||0) + finalPrice*(1-FEE_RATE);
      ss(`phub_user_${listing.sellerEmail}`, seller);
    }
    showToast(`Purchased "${listing.title}"!`);
  };

  const handleAddReview = async (listingId, rating, comment) => {
    const newR = { id:`r_${Date.now()}`, listingId, reviewer:user.name.toLowerCase().replace(/\s+/g,""), rating, comment, ts:Date.now() };
    const updated = [...reviews, newR];
    setReviews(updated); ss("phub_reviews", updated);
    showToast("Thanks for your review!");
  };

  const handlePromote = async (listing) => {
    if (!confirm(`Promote "${listing.title}" for $50? (demo)`)) return;
    const updated = listings.map(l => l.id===listing.id ? { ...l, featured:true } : l);
    setListings(updated); ss("phub_listings", updated);
    showToast("Project promoted!");
  };

  const handleUpgrade = async (planId) => {
    persistUser({ ...user, plan:planId, verified: planId==="startup"||planId==="ent" ? true : user.verified });
    setShowUpgrade(false);
    showToast(`Upgraded to ${PLANS.find(p=>p.id===planId).name}!`);
  };

  if (loading) return <div className="min-h-screen flex items-center justify-center paper-grain"><div className="flex items-center gap-3 pulse-soft"><LogoMark size={24}/><span className="font-mono text-xs tracking-widest uppercase" style={{color:C.muted}}>Loading the hub</span></div></div>;

  if (!user && browseOnly) {
    return (
      <>
        <nav className="sticky top-0 z-30 backdrop-blur-md" style={{backgroundColor:"rgba(245,240,230,0.85)",borderBottom:`1px solid ${C.border}`}}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <Logo size="md"/><Btn onClick={()=>setAuthOpen(true)}>Sign in to back</Btn>
          </div>
        </nav>
        <div className="paper-grain min-h-screen">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10">
            <Marketplace listings={listings} onSelect={setSelected} currentUser={{name:"Guest",email:""}} allReviews={reviews}/>
          </div>
        </div>
        {selected && (
          <div className="fixed inset-0 z-40 paper-grain overflow-y-auto">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-10">
              <ProjectDetail listing={selected} onBack={()=>setSelected(null)} currentUser={{name:"Guest",email:"",purchases:[]}} onPurchase={()=>{setSelected(null);setAuthOpen(true);}} reviews={reviews.filter(r=>r.listingId===selected.id)} onAddReview={()=>setAuthOpen(true)}/>
            </div>
          </div>
        )}
        {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onAuth={handleAuth}/>}
      </>
    );
  }

  if (!user) return <><Landing onAuth={()=>setAuthOpen(true)} onBrowse={()=>setBrowseOnly(true)}/>{authOpen && <AuthModal onClose={()=>setAuthOpen(false)} onAuth={handleAuth}/>}</>;

  const myListings = listings.filter(l => l.sellerEmail === user.email);
  const listingReviews = selected ? reviews.filter(r => r.listingId === selected.id) : [];

  return (
    <>
      <Shell user={user} view={view} setView={(v)=>{setView(v);setSelected(null);}} onLogout={handleLogout} onUpgrade={()=>setShowUpgrade(true)}>
        {selected ? (
          <ProjectDetail listing={selected} onBack={()=>setSelected(null)} currentUser={user} onPurchase={handlePurchase} reviews={listingReviews} onAddReview={handleAddReview}/>
        ) : (
          <>
            {view==="marketplace" && <Marketplace listings={listings} onSelect={setSelected} currentUser={user} allReviews={reviews}/>}
            {view==="selling"     && <Studio user={user} listings={myListings} onCreate={handleCreate} onPromote={handlePromote} onUpgrade={()=>setShowUpgrade(true)}/>}
            {view==="purchases"   && <Library user={user} allListings={listings} onSelect={setSelected}/>}
            {view==="wallet"      && <Wallet user={user} listings={listings} onUpgrade={()=>setShowUpgrade(true)}/>}
          </>
        )}
      </Shell>
      {showUpgrade && <UpgradeModal user={user} onClose={()=>setShowUpgrade(false)} onUpgrade={handleUpgrade}/>}
      {toast && <Toast key={toast.id} message={toast.msg} onClose={()=>setToast(null)}/>}
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
